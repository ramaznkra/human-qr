; aaPanel → Supervisor → Add
; Queue: sipariş broadcast, garson bildirimleri

[program:human-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /www/wwwroot/humansocialpeople.com/artisan queue:work database --sleep=1 --tries=3 --timeout=120
directory=/www/wwwroot/humansocialpeople.com
autostart=true
autorestart=true
stopwaitsecs=10
user=www
numprocs=1
redirect_stderr=true
stdout_logfile=/www/wwwroot/humansocialpeople.com/storage/logs/queue.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
