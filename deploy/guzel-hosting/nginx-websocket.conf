# aaPanel → Site → Config → SSL bloğuna ekleyin (Laravel location'larından ÖNCE veya SONRA)
# Reverb WebSocket: tarayıcı wss://domain/app üzerinden bağlanır

location /app {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
}

# Statik asset önbellek (menü JS/CSS, QR görselleri)
location ~* \.(js|css|png|jpg|jpeg|webp|gif|svg|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}
